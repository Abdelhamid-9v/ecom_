version: '3.8'

services:
  db:
    image: mariadb:latest
    container_name: hw_mariadb
    environment:
      MARIADB_ROOT_PASSWORD: EL.haddadi@2003
      MARIADB_DATABASE: ecommerce_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: hw_api
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DB_HOST=hw_mariadb
      - DB_USER=root
      - DB_PASSWORD=EL.haddadi@2003 # <-- O BDELNA HTA HADI
      - DB_NAME=ecommerce_db
    depends_on:
      - db
    volumes:
      - ./src:/app/src

volumes:
  db_data: